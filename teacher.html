<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="星图照片分享系统 - 教师后台管理">
  <meta name="theme-color" content="#050816">
  <title>教师后台 · 星图照片分享系统</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/star.css">
  <link rel="stylesheet" href="css/teacher.css">
</head>
<body>
  <!-- 星空背景 -->
  <div class="star-background"><div class="galaxy-layer"></div></div>
  <canvas id="starCanvas"></canvas>

  <div class="layout-sidebar">
    <!-- Sidebar -->
    <aside class="sidebar" role="navigation" aria-label="教师后台导航">
      <div class="sidebar__logo">🌟 教师后台</div>
      <nav class="sidebar__nav">
        <a class="sidebar__link sidebar__link--active" data-section="dashboard" href="#dashboard">📊 仪表板</a>
        <a class="sidebar__link" data-section="classes" href="#classes">🪐 班级统计</a>
        <a class="sidebar__link" data-section="students" href="#students">👨‍🎓 学生管理</a>
        <a class="sidebar__link" data-section="gallery" href="#gallery">🖼️ 作品浏览</a>
        <a class="sidebar__link" data-section="incomplete" href="#incomplete">⚠️ 未完成名单</a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__user-avatar">👩‍🏫</div>
          <div>
            <div class="sidebar__user-name" id="teacherName">教师</div>
            <div class="sidebar__user-role" id="teacherRole">teacher</div>
          </div>
        </div>
        <button class="btn btn--ghost btn--sm btn--block" id="teacherLogoutBtn">登出</button>
      </div>
    </aside>

    <!-- Dashboard -->
    <main class="dashboard" role="main">
      <!-- Dashboard 区段 -->
      <section class="dashboard-section" id="section-dashboard">
        <div class="dashboard-header">
          <h1 class="dashboard-header__title">📊 系统总览</h1>
          <div class="dashboard-header__actions">
            <button class="btn btn--secondary btn--sm" id="downloadCSVBtn">📥 下载 CSV</button>
            <button class="btn btn--secondary btn--sm" id="downloadExcelBtn">📥 下载 Excel</button>
          </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
          <div class="stat-card stat-card--students">
            <div class="stat-card__icon">👨‍🎓</div>
            <div class="stat-card__number" id="statTotalStudents">0</div>
            <div class="stat-card__label">总学生人数</div>
          </div>
          <div class="stat-card stat-card--completed">
            <div class="stat-card__icon">✅</div>
            <div class="stat-card__number" id="statCompleted">0</div>
            <div class="stat-card__label">已完成人数</div>
          </div>
          <div class="stat-card stat-card--rate">
            <div class="stat-card__icon">📈</div>
            <div class="stat-card__number" id="statRate">0%</div>
            <div class="stat-card__label">完成率</div>
          </div>
          <div class="stat-card stat-card--incomplete">
            <div class="stat-card__icon">⚠️</div>
            <div class="stat-card__number" id="statIncomplete">0</div>
            <div class="stat-card__label">未完成人数</div>
          </div>
        </div>

        <!-- 图表区 -->
        <div class="charts-row">
          <div class="chart-card glass-card">
            <h3 class="chart-card__title">完成率分布</h3>
            <canvas id="completionChart"></canvas>
          </div>
          <div class="chart-card glass-card">
            <h3 class="chart-card__title">各班完成情况</h3>
            <canvas id="classBarChart"></canvas>
          </div>
        </div>
      </section>

      <!-- 班级统计区段 -->
      <section class="dashboard-section" id="section-classes" style="display:none">
        <div class="dashboard-header">
          <h2 class="dashboard-header__title">🪐 班级完成率</h2>
        </div>
        <div class="class-progress-list" id="classProgressList">
          <p style="color:var(--text-muted);text-align:center">加载中...</p>
        </div>
      </section>

      <!-- 学生管理区段 -->
      <section class="dashboard-section" id="section-students">
        <div class="dashboard-header">
          <h2 class="dashboard-header__title">👨‍🎓 学生管理</h2>
        </div>

        <div class="filter-bar">
          <div class="search-box" style="flex:1;min-width:200px">
            <span class="search-box__icon" aria-hidden="true">🔍</span>
            <input type="text" id="teacherSearch" class="input" placeholder="搜索姓名、学号或班级..." aria-label="搜索学生">
          </div>
          <select id="statusFilter" class="select" style="min-width:140px" aria-label="状态筛选">
            <option value="all">全部状态</option>
            <option value="completed">已完成</option>
            <option value="incomplete">未完成</option>
          </select>
        </div>

        <div class="table-container">
          <table class="table" aria-label="学生列表">
            <thead>
              <tr>
                <th>姓名</th>
                <th>学号</th>
                <th>班级</th>
                <th>状态</th>
                <th>上传时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody">
              <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- 作品浏览区段 -->
      <section class="dashboard-section" id="section-gallery" style="display:none">
        <div class="dashboard-header">
          <h2 class="dashboard-header__title">🖼️ 所有作品</h2>
          <button class="btn btn--secondary btn--sm" onclick="window.location.href='gallery.html'">完整 Gallery →</button>
        </div>
        <p style="color:var(--text-muted);margin-top:32px;text-align:center">
          请前往 <a href="gallery.html" style="color:var(--primary-light)">作品展示页面</a> 查看所有学生作品
        </p>
      </section>

      <!-- 未完成名单区段 -->
      <section class="dashboard-section" id="section-incomplete" style="display:none">
        <div class="dashboard-header">
          <h2 class="dashboard-header__title">⚠️ 未完成名单</h2>
        </div>
        <div class="incomplete-list" id="incompleteList">
          <p style="color:var(--text-muted);text-align:center">加载中...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- JavaScript -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="firebase/firebaseConfig.js"></script>
  <script src="js/util.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/teacher.js"></script>
  <!-- 星空背景 -->
  <script>
    (function(){
      var c=document.getElementById('starCanvas');
      if(!c)return;
      var x=c.getContext('2d'),s=[];
      function r(){c.width=innerWidth;c.height=innerHeight;}
      r();addEventListener('resize',r);
      for(var i=0;i<100;i++)s.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,R:Math.random()*2+.5,o:Math.random()*.7+.3,S:Math.random()*.02+.005,p:Math.random()*Math.PI*2});
      (function a(){x.clearRect(0,0,c.width,c.height);
        s.forEach(function(s){var t=Math.sin(s.p)*.5+.5;x.fillStyle='rgba(255,255,255,'+(s.o*t)+')';x.beginPath();x.arc(s.x,s.y,s.R,0,Math.PI*2);x.fill();s.p+=s.S});
        requestAnimationFrame(a)})();
    })();
  </script>
</body>
</html>
