# Star Photo Share System
# GitHub Actions - 自动部署工作流
# Version 1.0
# 2026-07-17
#
# 功能：Push 到 main 分支时自动部署到 Firebase Hosting 或 GitHub Pages

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # 允许手动触发
  workflow_dispatch:

jobs:
  # ========================================
  # 代码质量检查
  # ========================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Check HTML Syntax
        run: |
          echo "Checking HTML files..."
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "  ✓ $file"
            fi
          done

      - name: Check JSON Validity
        run: |
          echo "Checking JSON files..."
          for file in data/*.json firebase.json .firebaserc package.json; do
            if [ -f "$file" ]; then
              node -e "JSON.parse(require('fs').readFileSync('$file','utf8'))" && echo "  ✓ $file" || echo "  ✗ $file"
            fi
          done

  # ========================================
  # 构建与部署
  # ========================================
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: lint
    # 仅在 main 分支 Push 时部署，PR 只检查
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Project
        run: |
          echo "Building Star Photo Share System..."
          mkdir -p dist
          # 复制所有静态文件
          cp -r *.html css/ js/ firebase/ data/ assets/ dist/
          cp firebase.json firestore.rules storage.rules .firebaserc dist/ 2>/dev/null || true
          echo "Build complete!"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Deployment Status
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Website: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"

  # ========================================
  # GitHub Pages 部署（备用）
  # ========================================
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
