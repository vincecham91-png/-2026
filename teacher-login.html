<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="星图照片分享系统 - 教师登入">
  <meta name="theme-color" content="#050816">
  <title>教师登入 · 星图照片分享系统</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/star.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- 星空背景 -->
  <div class="star-background"><div class="galaxy-layer"></div></div>
  <canvas id="starCanvas"></canvas>
  <div class="meteor-container"></div>

  <main class="login-page" role="main">
    <div class="login-card glass-card teacher-login-card">
      <div class="login-card__logo">👩‍🏫</div>
      <h1 class="login-card__title">教师登入</h1>
      <p class="login-card__subtitle">使用 Firebase 认证帐号登入</p>

      <!-- 错误提示 -->
      <div id="loginError" class="login-error" role="alert"></div>

      <!-- 登入表单 -->
      <form class="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="emailInput">Email</label>
          <input
            type="email"
            id="emailInput"
            class="input"
            placeholder="teacher@school.edu.my"
            autocomplete="email"
            required
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="passwordInput">密码</label>
          <input
            type="password"
            id="passwordInput"
            class="input"
            placeholder="请输入密码"
            autocomplete="current-password"
            required
            aria-required="true"
          >
          <a href="#" class="forgot-password" id="forgotPasswordLink">忘记密码？</a>
        </div>

        <button type="button" id="loginBtn" class="btn btn--primary btn--lg btn--block">
          教师登入 🔐
        </button>
      </form>

      <div class="login-divider">或</div>

      <p class="login-teacher-link">
        我是学生？<a href="login.html">前往学生登入</a>
      </p>

      <a href="index.html" class="login-back">← 返回首页</a>
    </div>
  </main>

  <!-- JavaScript -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase/firebaseConfig.js"></script>
  <script src="js/util.js"></script>
  <script src="js/firebase.js"></script>
  <script>
    /**
     * Star Photo Share System
     * 教师登入页面脚本
     * Version 1.0
     */
    (function(){
      'use strict';
      var S = window.SPSS || {};

      function init(){
        document.getElementById('loginBtn').addEventListener('click', teacherLogin);
        document.getElementById('passwordInput').addEventListener('keydown', function(e){
          if(e.key==='Enter'){ e.preventDefault(); teacherLogin(); }
        });
        document.getElementById('forgotPasswordLink').addEventListener('click', function(e){
          e.preventDefault();
          var email = document.getElementById('emailInput').value.trim();
          if(!email){ S.showToast('请先输入 Email 再点击忘记密码', 'warning'); return; }
          var auth = S.getAuth ? S.getAuth() : firebase.auth();
          auth.sendPasswordResetEmail(email).then(function(){
            S.showToast('密码重置邮件已发送，请检查邮箱', 'success');
          }).catch(function(err){
            S.showToast('发送失败：' + (err.message||'未知错误'), 'error');
          });
        });
      }

      async function teacherLogin(){
        var email = document.getElementById('emailInput').value.trim();
        var password = document.getElementById('passwordInput').value;
        var errorDiv = document.getElementById('loginError');
        if(errorDiv) errorDiv.classList.remove('login-error--visible');

        if(!email){ showError('请输入 Email'); return; }
        if(!password){ showError('请输入密码'); return; }

        var btn = document.getElementById('loginBtn');
        btn.classList.add('btn--loading');
        btn.disabled = true;
        btn.textContent = '登入中...';

        try {
          var teacher = null;
          if(S.teacherLogin){
            teacher = await S.teacherLogin(email, password);
          } else {
            // 直接使用 Firebase Auth
            var userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
            teacher = { uid: userCredential.user.uid, email: userCredential.user.email, role: 'teacher' };
          }

          if(teacher){
            S.saveSession && S.saveSession('teacherSession', teacher);
            if(S.addLog){ try { await S.addLog('login', teacher.uid||email, '教师登入'); } catch(e){} }
            S.showToast && S.showToast('登入成功！', 'success');
            setTimeout(function(){ window.location.href = 'teacher.html'; }, 500);
          }
        } catch(err){
          console.error('[TeacherLogin] 登入失败:', err);
          showError('帐号或密码错误：' + (err.message||''));
          if(btn){ btn.style.animation='none'; btn.offsetHeight; btn.style.animation='shake 0.5s ease'; }
        } finally {
          btn.classList.remove('btn--loading');
          btn.disabled = false;
          btn.textContent = '教师登入 🔐';
        }
      }

      function showError(msg){
        var errorDiv = document.getElementById('loginError');
        if(errorDiv){
          errorDiv.textContent = msg;
          errorDiv.classList.add('login-error--visible');
          setTimeout(function(){ errorDiv.classList.remove('login-error--visible'); }, 3000);
        }
        S.showToast && S.showToast(msg, 'error');
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
  <!-- 星空背景 -->
  <script>
    (function(){
      var c=document.getElementById('starCanvas');
      if(!c)return;
      var x=c.getContext('2d'),s=[];
      function r(){c.width=innerWidth;c.height=innerHeight;}
      r();addEventListener('resize',r);
      for(var i=0;i<200;i++)s.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,R:Math.random()*2+.5,o:Math.random()*.7+.3,S:Math.random()*.02+.005,p:Math.random()*Math.PI*2});
      (function a(){x.clearRect(0,0,c.width,c.height);
        s.forEach(function(s){var t=Math.sin(s.p)*.5+.5;x.fillStyle='rgba(255,255,255,'+(s.o*t)+')';x.beginPath();x.arc(s.x,s.y,s.R,0,Math.PI*2);x.fill();s.p+=s.S});
        requestAnimationFrame(a)})();
    })();
  </script>
</body>
</html>
